<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visszaszámláló</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #050d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    /* Starfield */
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      text-align: center;
      z-index: 10;
      padding: 2rem;
    }

    /* Bird */
    .bird-wrap {
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 30px rgba(100,160,255,0.3));
      position: relative;
      animation: fly 6s ease-in-out infinite;
    }

    @keyframes fly {
      0%   { transform: translateX(-60px) translateY(0px); }
      25%  { transform: translateX(0px)   translateY(-20px); }
      50%  { transform: translateX(60px)  translateY(0px); }
      75%  { transform: translateX(0px)   translateY(20px); }
      100% { transform: translateX(-60px) translateY(0px); }
    }

    .bird-wrap svg { width: 200px; height: 200px; }

    .eye-lid {
      animation: blink 5s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes blink {
      0%, 88%, 100% { transform: scaleY(0); }
      93% { transform: scaleY(1); }
    }

    /* Wing flap */
    .wing-left {
      transform-origin: 55px 115px;
      animation: flapL 0.4s ease-in-out infinite alternate;
    }
    .wing-right {
      transform-origin: 145px 115px;
      animation: flapR 0.4s ease-in-out infinite alternate;
    }
    @keyframes flapL {
      0%   { transform: rotate(0deg) scaleY(1); }
      100% { transform: rotate(-35deg) scaleY(0.6); }
    }
    @keyframes flapR {
      0%   { transform: rotate(0deg) scaleY(1); }
      100% { transform: rotate(35deg) scaleY(0.6); }
    }

    /* Motivational text */
    .motto {
      font-size: 2rem;
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 30px rgba(100,180,255,0.5);
    }

    .sub {
      font-size: 1rem;
      color: rgba(160,200,255,0.8);
      margin-bottom: 0.6rem;
      letter-spacing: 0.08em;
      font-style: italic;
    }

    .deadline {
      font-size: 0.85rem;
      color: rgba(120,170,255,0.6);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    /* Countdown boxes */
    .countdown {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .box {
      background: rgba(10,30,70,0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(80,140,255,0.25);
      border-radius: 18px;
      padding: 1.2rem 1.6rem;
      min-width: 95px;
      box-shadow: 0 0 30px rgba(50,100,255,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
      transition: transform 0.15s;
    }

    .box:hover { transform: scale(1.06); }

    .num {
      font-size: 3rem;
      font-weight: bold;
      color: #7ec8ff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 20px rgba(100,200,255,0.6);
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(120,180,255,0.6);
      margin-top: 0.4rem;
    }

    .separator {
      font-size: 2.8rem;
      color: rgba(100,180,255,0.4);
      align-self: center;
      margin-top: -0.4rem;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .done-msg {
      font-size: 2rem;
      color: #7ec8ff;
      font-weight: bold;
      display: none;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.7rem;
      color: rgba(100,150,255,0.35);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">

  <!-- New bird: side-glancing, wing raised, determined look -->
  <div class="bird-wrap">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bg2" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#ffaa50"/>
          <stop offset="55%" stop-color="#e06010"/>
          <stop offset="100%" stop-color="#8a3500"/>
        </radialGradient>
        <radialGradient id="belly2" cx="50%" cy="35%">
          <stop offset="0%" stop-color="#ffd080"/>
          <stop offset="100%" stop-color="#d07020"/>
        </radialGradient>
        <radialGradient id="wing2" cx="30%" cy="30%">
          <stop offset="0%" stop-color="#e07020"/>
          <stop offset="100%" stop-color="#7a2e00"/>
        </radialGradient>
        <radialGradient id="eye2" cx="30%" cy="25%">
          <stop offset="0%" stop-color="#4a2a10"/>
          <stop offset="100%" stop-color="#0a0400"/>
        </radialGradient>
        <filter id="f1">
          <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" result="n"/>
          <feDisplacementMap in="SourceGraphic" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="sh">
          <feGaussianBlur stdDeviation="2"/>
        </filter>
      </defs>

      <!-- Shadow -->
      <ellipse cx="100" cy="192" rx="44" ry="6" fill="rgba(0,0,60,0.4)" filter="url(#sh)"/>

      <!-- Feet -->
      <g fill="#c04800" stroke="#8a3200" stroke-width="1">
        <rect x="74" y="178" width="5" height="14" rx="2.5"/>
        <rect x="72" y="189" width="9" height="2.5" rx="1.2"/>
        <rect x="78" y="191" width="7" height="2.5" rx="1.2"/>
        <rect x="66" y="191" width="7" height="2.5" rx="1.2"/>
        <rect x="110" y="178" width="5" height="14" rx="2.5"/>
        <rect x="108" y="189" width="9" height="2.5" rx="1.2"/>
        <rect x="114" y="191" width="7" height="2.5" rx="1.2"/>
        <rect x="102" y="191" width="7" height="2.5" rx="1.2"/>
      </g>

      <!-- Body -->
      <circle cx="100" cy="115" r="72" fill="url(#bg2)" filter="url(#f1)"/>
      <circle cx="100" cy="115" r="68" fill="url(#bg2)" opacity="0.5" filter="url(#f1)"/>

      <!-- Belly -->
      <ellipse cx="102" cy="128" rx="36" ry="42" fill="url(#belly2)" opacity="0.75"/>

      <!-- Left wing — flapping -->
      <g class="wing-left">
        <ellipse cx="36" cy="115" rx="38" ry="14" fill="url(#wing2)" transform="rotate(-20 36 115)" filter="url(#f1)" opacity="0.9"/>
        <ellipse cx="22" cy="100" rx="20" ry="9" fill="#c05008" transform="rotate(-30 22 100)" filter="url(#f1)"/>
      </g>

      <!-- Right wing — flapping -->
      <g class="wing-right">
        <ellipse cx="164" cy="115" rx="38" ry="14" fill="url(#wing2)" transform="rotate(20 164 115)" filter="url(#f1)" opacity="0.85"/>
        <ellipse cx="178" cy="100" rx="20" ry="9" fill="#c05008" transform="rotate(30 178 100)" filter="url(#f1)"/>
      </g>

      <!-- Head fluffy -->
      <circle cx="100" cy="82" r="50" fill="#e06010" filter="url(#f1)" opacity="0.55"/>

      <!-- Crest — spiky/determined -->
      <ellipse cx="86" cy="38" rx="8" ry="20" fill="#c04808" transform="rotate(-30 86 38)" filter="url(#f1)"/>
      <ellipse cx="100" cy="30" rx="9" ry="22" fill="#d05808" filter="url(#f1)"/>
      <ellipse cx="114" cy="36" rx="8" ry="18" fill="#c04808" transform="rotate(25 114 36)" filter="url(#f1)"/>
      <ellipse cx="120" cy="44" rx="6" ry="14" fill="#b03800" transform="rotate(45 120 44)" filter="url(#f1)"/>

      <!-- Eye whites — one big (facing slightly right, determined) -->
      <circle cx="112" cy="88" r="18" fill="white"/>
      <circle cx="80" cy="90" r="14" fill="white"/>
      <!-- Pupils — looking slightly to the side (determined gaze) -->
      <circle cx="116" cy="91" r="12" fill="url(#eye2)"/>
      <circle cx="83" cy="93" r="9" fill="url(#eye2)"/>
      <!-- Shine -->
      <circle cx="109" cy="84" r="4.5" fill="white" opacity="0.85"/>
      <circle cx="77" cy="87" r="3.5" fill="white" opacity="0.85"/>
      <circle cx="111" cy="82" r="2" fill="white"/>
      <!-- Blink -->
      <rect class="eye-lid" x="94" y="70" width="36" height="36" rx="18" fill="#e06010"/>
      <rect class="eye-lid" x="66" y="76" width="28" height="28" rx="14" fill="#e06010"/>

      <!-- Determined little frown/beak -->
      <path d="M95 110 L102 122 L109 110 Z" fill="#d07010" stroke="#b05000" stroke-width="1"/>
      <path d="M95 110 L109 110" stroke="#b05000" stroke-width="1.5"/>

      <!-- Cheek blush -->
      <ellipse cx="128" cy="100" rx="10" ry="6" fill="#ff6030" opacity="0.2"/>
      <ellipse cx="68" cy="104" rx="8" ry="5" fill="#ff6030" opacity="0.2"/>

      <!-- Small star near raised wing tip -->
      <polygon points="22,58 24,64 30,64 25,68 27,74 22,70 17,74 19,68 14,64 20,64"
        fill="#ffe080" opacity="0.85" filter="url(#glow)"/>
    </svg>
  </div>

  <div class="motto">Keep going.</div>
  <div class="sub">The finish line is closer than you think.</div>
  <div class="deadline">Július 31.</div>

  <div class="countdown" id="countdown">
    <div class="box">
      <div class="num" id="days">--</div>
      <div class="label">Days</div>
    </div>
    <div class="separator">:</div>
    <div class="box">
      <div class="num" id="hours">--</div>
      <div class="label">Hours</div>
    </div>
    <div class="separator">:</div>
    <div class="box">
      <div class="num" id="minutes">--</div>
      <div class="label">Minutes</div>
    </div>
    <div class="separator">:</div>
    <div class="box">
      <div class="num" id="seconds">--</div>
      <div class="label">Seconds</div>
    </div>
  </div>

  <div class="done-msg" id="done">🎉 You made it! 🎉</div>

  <footer>PureBreathe PRO &nbsp;·&nbsp; 2026</footer>
</div>

<script>
  // Starfield
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 200; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.005 + 0.002,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,220,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  resize();
  initStars();
  window.addEventListener('resize', () => { resize(); initStars(); });
  requestAnimationFrame(drawStars);

  // Countdown
  const target = new Date('2026-07-31T23:59:59');
  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const diff = target - new Date();
    if (diff <= 0) {
      document.getElementById('countdown').style.display = 'none';
      document.getElementById('done').style.display = 'block';
      return;
    }
    document.getElementById('days').textContent    = pad(Math.floor(diff / 86400000));
    document.getElementById('hours').textContent   = pad(Math.floor((diff % 86400000) / 3600000));
    document.getElementById('minutes').textContent = pad(Math.floor((diff % 3600000) / 60000));
    document.getElementById('seconds').textContent = pad(Math.floor((diff % 60000) / 1000));
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
