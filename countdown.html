<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visszaszámláló</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #050d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }
    canvas.stars {
      position: fixed; top:0; left:0;
      width:100%; height:100%;
      z-index:0; pointer-events:none;
    }
    .container { text-align:center; z-index:10; padding:2rem; }
    .scene { position:relative; width:240px; height:240px; margin:0 auto 0.5rem; }
    #birdCanvas { position:absolute; top:0; left:0; width:100%; height:100%; }
    .motto {
      font-size:2rem; font-weight:bold; color:#fff;
      letter-spacing:0.05em; margin-bottom:0.3rem;
      text-shadow:0 0 30px rgba(100,180,255,0.5);
    }
    .sub {
      font-size:1rem; color:rgba(160,200,255,0.8);
      margin-bottom:0.6rem; letter-spacing:0.08em; font-style:italic;
    }
    .deadline {
      font-size:0.85rem; color:rgba(120,170,255,0.6);
      letter-spacing:0.3em; text-transform:uppercase; margin-bottom:2rem;
    }
    .countdown { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
    .box {
      background:rgba(10,30,70,0.7); backdrop-filter:blur(12px);
      border:1px solid rgba(80,140,255,0.25); border-radius:18px;
      padding:1.2rem 1.6rem; min-width:95px;
      box-shadow:0 0 30px rgba(50,100,255,0.08),inset 0 1px 0 rgba(255,255,255,0.05);
      transition:transform 0.15s;
    }
    .box:hover { transform:scale(1.06); }
    .num {
      font-size:3rem; font-weight:bold; color:#7ec8ff;
      line-height:1; font-variant-numeric:tabular-nums;
      text-shadow:0 0 20px rgba(100,200,255,0.6);
    }
    .label {
      font-size:0.65rem; letter-spacing:0.22em;
      text-transform:uppercase; color:rgba(120,180,255,0.6); margin-top:0.4rem;
    }
    .separator {
      font-size:2.8rem; color:rgba(100,180,255,0.4);
      align-self:center; margin-top:-0.4rem;
      animation:pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .done-msg { font-size:2rem; color:#7ec8ff; font-weight:bold; display:none; }
    footer {
      margin-top:2.5rem; font-size:0.7rem;
      color:rgba(100,150,255,0.35); letter-spacing:0.15em; text-transform:uppercase;
    }
  </style>
</head>
<body>
<canvas class="stars" id="stars"></canvas>

<div class="container">
  <div class="scene">
    <canvas id="birdCanvas" width="240" height="240"></canvas>
  </div>
  <div class="motto">Keep going.</div>
  <div class="sub">The finish line is closer than you think.</div>
  <div class="deadline">Július 31.</div>
  <div class="countdown" id="countdown">
    <div class="box"><div class="num" id="days">--</div><div class="label">Days</div></div>
    <div class="separator">:</div>
    <div class="box"><div class="num" id="hours">--</div><div class="label">Hours</div></div>
    <div class="separator">:</div>
    <div class="box"><div class="num" id="minutes">--</div><div class="label">Minutes</div></div>
    <div class="separator">:</div>
    <div class="box"><div class="num" id="seconds">--</div><div class="label">Seconds</div></div>
  </div>
  <div class="done-msg" id="done">🎉 You made it! 🎉</div>
  <footer>PureBreathe PRO &nbsp;·&nbsp; 2026</footer>
</div>

<script>
// ── STARFIELD ──────────────────────────────────────────────
const starCanvas = document.getElementById('stars');
const sc = starCanvas.getContext('2d');
let stars = [];
function resizeStars() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  stars = [];
  for (let i=0;i<200;i++) stars.push({
    x:Math.random()*starCanvas.width, y:Math.random()*starCanvas.height,
    r:Math.random()*1.5+0.2, speed:Math.random()*0.004+0.002, phase:Math.random()*Math.PI*2
  });
}
function drawStars(t) {
  sc.clearRect(0,0,starCanvas.width,starCanvas.height);
  stars.forEach(s => {
    const a = 0.25+0.75*(0.5+0.5*Math.sin(t*s.speed*60+s.phase));
    sc.beginPath(); sc.arc(s.x,s.y,s.r,0,Math.PI*2);
    sc.fillStyle=`rgba(180,220,255,${a})`; sc.fill();
  });
  requestAnimationFrame(drawStars);
}
resizeStars();
window.addEventListener('resize', resizeStars);
requestAnimationFrame(drawStars);

// ── HELPERS ────────────────────────────────────────────────
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function easeInOut(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

// Draw a fluffy/bumpy circle using many small arcs overlapping
function fluffyBlob(ctx, cx, cy, r, wobble, color, alpha=1) {
  ctx.save();
  ctx.globalAlpha *= alpha;
  // Base circle
  const g = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, r*0.1, cx, cy, r);
  if (typeof color === 'string') {
    g.addColorStop(0, lighten(color, 0.4));
    g.addColorStop(0.5, color);
    g.addColorStop(1, darken(color, 0.35));
  }
  // Draw wobbly outline
  ctx.beginPath();
  const steps = 48;
  for (let i=0;i<=steps;i++) {
    const angle = (i/steps)*Math.PI*2;
    const bump = wobble*(
      Math.sin(angle*3+0.5)*0.5 +
      Math.sin(angle*5+1.2)*0.3 +
      Math.sin(angle*7+0.8)*0.15 +
      Math.sin(angle*9+2.1)*0.05
    );
    const rr = r + bump;
    const x = cx + Math.cos(angle)*rr;
    const y = cy + Math.sin(angle)*rr;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle = typeof color==='string' ? g : color;
  ctx.fill();
  ctx.restore();
}

function lighten(hex, amt) {
  let [r,g,b] = hexRGB(hex);
  return `rgb(${Math.min(255,r+255*amt)},${Math.min(255,g+255*amt)},${Math.min(255,b+255*amt)})`;
}
function darken(hex, amt) {
  let [r,g,b] = hexRGB(hex);
  return `rgb(${Math.max(0,r-255*amt)},${Math.max(0,g-255*amt)},${Math.max(0,b-255*amt)})`;
}
function hexRGB(hex) {
  if (hex.startsWith('rgb')) {
    const m = hex.match(/\d+/g); return [+m[0],+m[1],+m[2]];
  }
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];
}
function lerpColor(c1,c2,t) {
  const [r1,g1,b1]=hexRGB(c1),[r2,g2,b2]=hexRGB(c2);
  return `rgb(${Math.round(lerp(r1,r2,t))},${Math.round(lerp(g1,g2,t))},${Math.round(lerp(b1,b2,t))})`;
}

// ── DRAW FLUFFY BIRD ───────────────────────────────────────
function drawFluffyBird(ctx, cx, cy, flapA, blink, alarm) {
  ctx.save();
  ctx.translate(cx, cy);

  const bodyC  = alarm > 0 ? lerpColor('#e06010','#e03000',alarm*0.6) : '#e06010';
  const lightC = alarm > 0 ? lerpColor('#ff9a40','#ff5020',alarm*0.5) : '#ff9a40';
  const darkC  = alarm > 0 ? lerpColor('#b04000','#801000',alarm*0.5) : '#b04000';
  const bellyC = alarm > 0 ? lerpColor('#ffc870','#ff9020',alarm*0.4) : '#ffc870';

  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.beginPath(); ctx.ellipse(0, 72, 44, 7, 0, 0, Math.PI*2);
  ctx.fillStyle = '#000030'; ctx.fill();
  ctx.restore();

  // Feet
  ctx.strokeStyle='#c04800'; ctx.lineWidth=3; ctx.lineCap='round';
  [[-18,55],[18,55]].forEach(([fx,fy])=>{
    ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(fx,70); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx,70); ctx.lineTo(fx-10,75); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx,70); ctx.lineTo(fx+4,76); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx,70); ctx.lineTo(fx-4,78); ctx.stroke();
  });

  // Wings — flapping
  ctx.save();
  ctx.translate(-62, 10);
  ctx.rotate(-flapA * 0.8);
  fluffyBlob(ctx, 0, 0, 26, 6, darkC);
  fluffyBlob(ctx, -8, -4, 16, 4, bodyC, 0.7);
  ctx.restore();

  ctx.save();
  ctx.translate(62, 10);
  ctx.rotate(flapA * 0.8);
  fluffyBlob(ctx, 0, 0, 26, 6, darkC);
  fluffyBlob(ctx, 8, -4, 16, 4, bodyC, 0.7);
  ctx.restore();

  // Body — big round fluffy
  fluffyBlob(ctx, 0, 14, 60, 9, bodyC);
  fluffyBlob(ctx, 0, 14, 56, 7, lightC, 0.45);

  // Belly (lighter patch)
  ctx.save();
  const bg = ctx.createRadialGradient(-2, 8, 5, 0, 18, 38);
  bg.addColorStop(0, bellyC);
  bg.addColorStop(1, 'rgba(210,140,30,0)');
  ctx.beginPath(); ctx.ellipse(0, 22, 28, 34, 0, 0, Math.PI*2);
  ctx.fillStyle = bg; ctx.fill();
  ctx.restore();

  // Head
  fluffyBlob(ctx, 2, -38, 42, 8, bodyC);
  fluffyBlob(ctx, 2, -38, 38, 6, lightC, 0.4);

  // Crest feathers on top
  const crests = [
    {ox:-14, oy:-74, rx:7, ry:16, rot:-0.35},
    {ox:-2,  oy:-80, rx:8, ry:18, rot:-0.05},
    {ox:12,  oy:-76, rx:7, ry:15, rot:0.25},
    {ox:22,  oy:-68, rx:5, ry:12, rot:0.5},
  ];
  crests.forEach(c => {
    ctx.save();
    ctx.translate(c.ox, c.oy);
    ctx.rotate(c.rot);
    fluffyBlob(ctx, 0, 0, (c.rx+c.ry)/2, 3, darkC);
    ctx.restore();
  });

  // Eyes — big and round like the original
  const eyeR = alarm > 0 ? lerp(16, 20, alarm) : 16;
  // Whites
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(-16,-44,eyeR,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(20,-44,eyeR,0,Math.PI*2); ctx.fill();

  // Pupils — look down at fire when alarmed
  const pupilOY = lerp(0, 10, alarm);
  ctx.fillStyle='#1a0500';
  ctx.beginPath(); ctx.arc(-14,-42+pupilOY,eyeR*0.78,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(22,-42+pupilOY,eyeR*0.78,0,Math.PI*2); ctx.fill();

  // Eye shine (big + small)
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(-20,-48+pupilOY*0.3,5.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(16,-48+pupilOY*0.3,5.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(-18,-46+pupilOY*0.3,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(18,-46+pupilOY*0.3,2.5,0,Math.PI*2); ctx.fill();

  // Blink overlay
  if (blink) {
    ctx.fillStyle = bodyC;
    ctx.beginPath(); ctx.arc(-16,-44,eyeR+1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(20,-44,eyeR+1,0,Math.PI*2); ctx.fill();
  }

  // Beak — pointing down, small triangle
  ctx.fillStyle='#e07820';
  ctx.beginPath();
  ctx.moveTo(-6,-24); ctx.lineTo(2,-10+alarm*6); ctx.lineTo(10,-24);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#b05800'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-6,-24); ctx.lineTo(10,-24); ctx.stroke();

  // Cheek blush
  ctx.save();
  ctx.globalAlpha=0.22;
  ctx.fillStyle='#ff5020';
  ctx.beginPath(); ctx.ellipse(-34,-36,12,7,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(36,-36,12,7,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Sweat drops when alarmed
  if (alarm > 0.3) {
    ctx.save(); ctx.globalAlpha = alarm;
    [[42,-38],[-46,-32]].forEach(([sx,sy])=>{
      ctx.fillStyle='rgba(100,180,255,0.85)';
      ctx.beginPath();
      ctx.arc(sx,sy+5,4,0,Math.PI*2); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(sx-3,sy+5); ctx.lineTo(sx,sy); ctx.lineTo(sx+3,sy+5);
      ctx.closePath(); ctx.fill();
    });
    ctx.restore();
  }

  ctx.restore();
}

// ── DRAW GRILLED CHICKEN ───────────────────────────────────
function drawGrilledChicken(ctx, cx, cy) {
  ctx.save();
  ctx.translate(cx, cy);

  // Drumsticks
  function drumstick(ox, angle) {
    ctx.save(); ctx.translate(ox, 40); ctx.rotate(angle);
    // Meat part
    const mg = ctx.createRadialGradient(-4,-5,3,0,0,18);
    mg.addColorStop(0,'#c8640a'); mg.addColorStop(0.5,'#a04808'); mg.addColorStop(1,'#5a2200');
    ctx.beginPath(); ctx.ellipse(0,0,13,20,0,0,Math.PI*2);
    ctx.fillStyle=mg; ctx.fill();
    // Grill marks on drumstick
    ctx.strokeStyle='rgba(30,8,0,0.55)'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-8,-10); ctx.lineTo(8,4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-8,-2); ctx.lineTo(8,12); ctx.stroke();
    // Bone
    ctx.fillStyle='#f5e8cc';
    ctx.beginPath(); ctx.ellipse(0,26,5,10,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#e8d8b0';
    ctx.beginPath(); ctx.arc(0,35,7,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  drumstick(-32, -0.2);
  drumstick(32, 0.2);

  // Main body
  const bg = ctx.createRadialGradient(-15,-10,5,0,0,60);
  bg.addColorStop(0,'#d4780a');
  bg.addColorStop(0.4,'#b05010');
  bg.addColorStop(0.75,'#7a3208');
  bg.addColorStop(1,'#3a1200');
  ctx.beginPath(); ctx.ellipse(0,8,54,48,0,0,Math.PI*2);
  ctx.fillStyle=bg; ctx.fill();

  // Crispy skin texture — lighter highlight on top
  const skin = ctx.createRadialGradient(-10,-15,5,0,0,45);
  skin.addColorStop(0,'rgba(255,190,80,0.45)');
  skin.addColorStop(0.5,'rgba(220,120,20,0.15)');
  skin.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.ellipse(0,8,54,48,0,0,Math.PI*2);
  ctx.fillStyle=skin; ctx.fill();

  // Grill marks — diagonal stripes
  ctx.save();
  ctx.beginPath(); ctx.ellipse(0,8,54,48,0,0,Math.PI*2); ctx.clip();
  ctx.strokeStyle='rgba(25,6,0,0.55)'; ctx.lineWidth=5; ctx.lineCap='butt';
  for (let i=-80;i<=80;i+=22) {
    ctx.beginPath(); ctx.moveTo(i,-50); ctx.lineTo(i+50,50); ctx.stroke();
  }
  // Second direction
  ctx.strokeStyle='rgba(25,6,0,0.25)'; ctx.lineWidth=3;
  for (let i=-80;i<=80;i+=22) {
    ctx.beginPath(); ctx.moveTo(i+50,-50); ctx.lineTo(i,50); ctx.stroke();
  }
  ctx.restore();

  // Wings — small tucked on sides
  function wing(ox, angle) {
    ctx.save(); ctx.translate(ox, 0); ctx.rotate(angle);
    const wg = ctx.createRadialGradient(-5,-5,2,0,0,22);
    wg.addColorStop(0,'#b06018'); wg.addColorStop(1,'#5a2808');
    ctx.beginPath(); ctx.ellipse(0,0,20,12,0,0,Math.PI*2);
    ctx.fillStyle=wg; ctx.fill();
    // grill marks
    ctx.strokeStyle='rgba(25,6,0,0.4)'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-10,-4); ctx.lineTo(6,6); ctx.stroke();
    ctx.restore();
  }
  wing(-54, 0.15);
  wing(54, -0.15);

  // Neck
  const ng = ctx.createRadialGradient(0,-42,3,0,-50,18);
  ng.addColorStop(0,'#c06010'); ng.addColorStop(1,'#6a2808');
  ctx.beginPath(); ctx.ellipse(0,-44,12,16,0,0,Math.PI*2);
  ctx.fillStyle=ng; ctx.fill();

  // Head — small and round
  const hg = ctx.createRadialGradient(-8,-72,4,0,-68,22);
  hg.addColorStop(0,'#c86818'); hg.addColorStop(0.5,'#9a4210'); hg.addColorStop(1,'#4a1808');
  ctx.beginPath(); ctx.arc(0,-68,22,0,Math.PI*2);
  ctx.fillStyle=hg; ctx.fill();

  // Crispy highlight on head
  ctx.save(); ctx.globalAlpha=0.3;
  ctx.beginPath(); ctx.arc(-6,-74,12,0,Math.PI*2);
  ctx.fillStyle='#ffa030'; ctx.fill();
  ctx.restore();

  // Eyes — X X (cooked)
  ctx.strokeStyle='rgba(10,2,0,0.8)'; ctx.lineWidth=3; ctx.lineCap='round';
  [[-10,-70],[10,-70]].forEach(([ex,ey])=>{
    ctx.beginPath(); ctx.moveTo(ex-5,ey-5); ctx.lineTo(ex+5,ey+5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex+5,ey-5); ctx.lineTo(ex-5,ey+5); ctx.stroke();
  });

  // Beak — small
  ctx.fillStyle='#b06020';
  ctx.beginPath(); ctx.moveTo(-5,-58); ctx.lineTo(0,-50); ctx.lineTo(5,-58); ctx.closePath(); ctx.fill();

  // Steam wisps
  [[-15,-92],[0,-96],[15,-92]].forEach(([sx,sy],i)=>{
    ctx.save(); ctx.globalAlpha=0.35;
    ctx.strokeStyle='#cccccc'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(sx,sy);
    ctx.bezierCurveTo(sx-6,sy-12,sx+6,sy-24,sx,sy-36);
    ctx.stroke();
    ctx.restore();
  });

  ctx.restore();
}

// ── FLAMES ────────────────────────────────────────────────
function drawFlame(ctx, x, y, height, time) {
  const flames=[
    {ox:-22,w:16,h:height*0.75,p:0},
    {ox:-8, w:20,h:height,    p:1.1},
    {ox:8,  w:20,h:height*0.9,p:2.0},
    {ox:22, w:16,h:height*0.8,p:3.1},
    {ox:0,  w:12,h:height*0.6,p:0.5},
  ];
  flames.forEach(f=>{
    const flicker = 1+0.12*Math.sin(time*7+f.p);
    const fh = f.h*flicker;
    const grad = ctx.createRadialGradient(x+f.ox,y,2,x+f.ox,y-fh*0.5,fh);
    grad.addColorStop(0,'rgba(255,250,100,0.98)');
    grad.addColorStop(0.25,'rgba(255,160,20,0.9)');
    grad.addColorStop(0.6,'rgba(230,60,10,0.7)');
    grad.addColorStop(1,'rgba(150,10,0,0)');
    ctx.beginPath();
    ctx.moveTo(x+f.ox-f.w/2,y);
    ctx.bezierCurveTo(x+f.ox-f.w*0.6,y-fh*0.35,x+f.ox-f.w*0.15,y-fh*0.85,x+f.ox,y-fh);
    ctx.bezierCurveTo(x+f.ox+f.w*0.15,y-fh*0.85,x+f.ox+f.w*0.6,y-fh*0.35,x+f.ox+f.w/2,y);
    ctx.closePath();
    ctx.fillStyle=grad; ctx.fill();
  });
}

// ── MAIN BIRD LOOP ─────────────────────────────────────────
const bc  = document.getElementById('birdCanvas');
const bx  = bc.getContext('2d');
const W=bc.width, H=bc.height;
const LOOP=10000;
let startTime=null;
let bx_=130, by_=120, bvx=0.9, bvy=0.35;
let flapT=0, blinkT=0, isBlinking=false, blinkCool=0;

function frame(ts) {
  if (!startTime) startTime=ts;
  const elapsed=(ts-startTime)%LOOP;
  const t=elapsed/LOOP;

  // Phase timings
  const P_FLY=0.40, P_ALARM=0.50, P_ROAST=0.70, P_CHICKEN=0.85, P_POOF=1.0;

  let alarm=0, roast=0, flying=true;
  if (t<P_FLY) {
    alarm=0; roast=0;
  } else if (t<P_ALARM) {
    alarm=easeInOut((t-P_FLY)/(P_ALARM-P_FLY)); roast=0; flying=false;
  } else if (t<P_ROAST) {
    alarm=1; roast=easeInOut((t-P_ALARM)/(P_ROAST-P_ALARM)); flying=false;
  } else if (t<P_CHICKEN) {
    alarm=0; roast=1; flying=false;
  } else {
    const p=(t-P_CHICKEN)/(P_POOF-P_CHICKEN);
    roast=1-easeInOut(p); alarm=0; flying=p>0.6;
  }

  // Move bird
  if (flying) {
    bx_+=bvx*1.1; by_+=bvy*0.9;
    if (bx_>195||bx_<45) bvx*=-1;
    if (by_>175||by_<65) bvy*=-1;
  } else {
    bx_+=((W/2)-bx_)*0.05;
    by_+=(115-by_)*0.05;
  }

  // Flap
  flapT+=0.2;
  const flapA = Math.sin(flapT)*(flying?0.6:0.08);

  // Blink
  blinkT++; blinkCool--;
  if (!isBlinking && blinkCool<=0 && blinkT%200<8) { isBlinking=true; blinkCool=140; }
  if (blinkT%200>=8) isBlinking=false;

  bx.clearRect(0,0,W,H);

  if (roast < 0.98) {
    // Flames when alarmed/roasting
    if (alarm>0 || roast>0) {
      const fh = lerp(20, 55, Math.max(alarm, roast));
      drawFlame(bx, bx_, by_+62, fh, ts/1000);
    }
    // Fluffy bird (fades out as roast increases)
    bx.save(); bx.globalAlpha = 1-roast;
    drawFluffyBird(bx, bx_, by_, flapA, isBlinking && roast<0.05, alarm);
    bx.restore();
  }

  if (roast > 0.02) {
    // Grilled chicken (fades in)
    bx.save(); bx.globalAlpha = Math.min(roast*1.5, 1);
    drawGrilledChicken(bx, bx_, by_-10);
    bx.restore();
  }

  // Poof particles when resetting
  if (t>P_CHICKEN) {
    const p=(t-P_CHICKEN)/(P_POOF-P_CHICKEN);
    if (p<0.4) {
      for (let i=0;i<10;i++) {
        const a=(i/10)*Math.PI*2;
        const d=p*80;
        const pr=7*(1-p/0.4);
        bx.beginPath();
        bx.arc(bx_+Math.cos(a)*d, by_+Math.sin(a)*d, pr, 0, Math.PI*2);
        bx.fillStyle=`rgba(255,${180+i*7},80,${(0.4-p)*2.5})`;
        bx.fill();
      }
    }
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ── COUNTDOWN ─────────────────────────────────────────────
const target=new Date('2026-07-31T23:59:59');
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  const diff=target-new Date();
  if(diff<=0){
    document.getElementById('countdown').style.display='none';
    document.getElementById('done').style.display='block'; return;
  }
  document.getElementById('days').textContent   =pad(Math.floor(diff/86400000));
  document.getElementById('hours').textContent  =pad(Math.floor((diff%86400000)/3600000));
  document.getElementById('minutes').textContent=pad(Math.floor((diff%3600000)/60000));
  document.getElementById('seconds').textContent=pad(Math.floor((diff%60000)/1000));
}
tick(); setInterval(tick,1000);
</script>
